version: '3.8'
services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres-sq15
    environment:
      POSTGRES_USER: sq15
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: curso_sq15
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: .
    container_name: springboot-backend
    ports:
      - "8083:8083"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/curso_sq15
      SPRING_DATASOURCE_USERNAME: sq15
      SPRING_DATASOURCE_PASSWORD: secret
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_PROFILES_ACTIVE: dev
    depends_on:
      - postgres


volumes:
  postgres_data:
